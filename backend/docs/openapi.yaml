openapi: 3.0.0
info:
  title: Repargo Platform API
  description: >
    Complete Backend API specifications for Customer, Technician, and Admin interactions for the Repargo Mobile Repair framework.
  version: 1.0.0
servers:
  - url: http://localhost:5000/api
    description: Local Development Server
  - url: https://api.repargo.com/api
    description: Production Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  
  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        fcmToken:
          type: string
        address:
          type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Invalid Request Parameter"

security:
  - bearerAuth: []

paths:
  /auth/send-otp:
    post:
      summary: Dispatch an OTP to the customer/technician's phone
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  example: "+919876543210"
      responses:
        '200':
          description: OTP dispatched successfully
  
  /auth/login:
    post:
      summary: Validate OTP payload & Issue Backend JWT Auth token
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
      responses:
        '200':
          description: Login Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR..."
                  user:
                    $ref: '#/components/schemas/User'

  /bookings/create:
    post:
      summary: Initialize a new repair job and trigger Worker Match dispatch
      tags: [Bookings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
               type: object
               properties:
                 serviceId:
                   type: string
                   example: "64d1f9...f2"
                 deviceBrand:
                   type: string
                   example: "Apple"
                 deviceModel:
                   type: string
                   example: "iPhone 13"
                 issue:
                   type: string
                 coordinates:
                   type: array
                   items:
                     type: number
                   example: [77.2090, 28.6139]
                 cost:
                   type: number
                   example: 1499
      responses:
        '201':
          description: Booking registered into the queue System

  /technicians/location-update:
    put:
      summary: Push Continuous Location Stream for Live Map Integration
      tags: [Technicians]
      requestBody:
        required: true
        content:
          application/json:
            schema:
               type: object
               properties:
                 coordinates:
                   type: array
                   items:
                     type: number
                   example: [77.2091, 28.6140]
      responses:
        '200':
          description: OK 

  /technicians/live-location/{bookingId}:
    get:
      summary: Customer tracking ping to fetch technician's exact Map location based on the active booking session
      tags: [Customer - Tracking]
      parameters:
        - in: path
          name: bookingId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Active Latitude & Longitude vector mapped
        '404':
          description: Record lost / Disconnected

  /payments/create-order:
    post:
      summary: Wrap standard Razorpay Checkout SDK initializer Order Id
      tags: [Payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
               type: object
               properties:
                 bookingId:
                   type: string
      responses:
        '200':
          description: Returns specific Razorpay `orderId` needed for checkout popup.

  /payments/verify:
    post:
      summary: Process signature checks securely parsing the payment validation hash
      tags: [Payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
               type: object
               properties:
                 bookingId:
                   type: string
                 razorpay_order_id:
                   type: string
                 razorpay_payment_id:
                   type: string
                 razorpay_signature:
                   type: string
      responses:
        '200':
          description: Payment Success Log Written to DB

  /notifications/sync-token:
    put:
      summary: Send active physical device Push Token mapping generated natively via Expo/Firebase
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
               type: object
               properties:
                 fcmToken:
                   type: string
                 model:
                   type: string
                   enum: [User, Technician]
      responses:
        '200':
          description: Token Associated. Ready for Pushes.
